[localized_notes]
enabled = true

[paper_body]
default_profile = "ten-question-review"
preserve_existing_layout = true
required_sections = []
recommended_sections = [
  "Summary",
  "Key Ideas",
  "Notes",
  "Related",
  "Citations",
]

[paper_body.section_descriptions]
"Summary" = "Concise overview of the paper's problem, approach, and main result."
"Key Ideas" = "The central claims, mechanisms, or conceptual contributions worth remembering."
"Method" = "How the proposed approach works, including model design, algorithm, training setup, or system architecture."
"Experiments" = "Evaluation setup, datasets, baselines, metrics, and key empirical findings."
"Limitations" = "Known weaknesses, assumptions, failure cases, and boundaries of the evidence."
"Notes" = "Reader-owned observations, questions, interpretation, and follow-up thoughts."
"Related" = "Links to related papers, topics, methods, datasets, benchmarks, or local notes."
"Citations" = "Sources used for the note, including paper metadata, arXiv pages, project pages, or other references."
"What To Reproduce" = "The concrete result, figure, table, benchmark, or behavior to reproduce."
"Algorithm" = "Implementation-level steps, pseudocode, model components, or training procedure."
"Data" = "Datasets, preprocessing, splits, licenses, and input/output formats needed for reproduction."
"Metrics" = "Evaluation metrics, success criteria, reporting conventions, and comparison targets."
"Engineering Notes" = "Practical setup details, dependencies, compute requirements, runtime issues, and implementation choices."
"Failure Modes" = "Ways the implementation, method, or reproduction can fail, including debugging observations."
"One-line Takeaway" = "A compact statement of the paper's main contribution or why it matters."
"Research Context" = "Where the paper sits in the literature and what problem thread it contributes to."
"Method Family" = "The broader class of methods, techniques, or research tradition the paper belongs to."
"Compared With" = "Important contrasts with prior work, baselines, or nearby papers."
"Useful For" = "Situations, projects, or research questions where this paper may be useful."
"Open Questions" = "Unresolved questions, future work, and uncertainties raised by the paper."
"Q1 Research Problem" = "The core problem or research question the paper tries to solve, plus the concrete sub-questions that make the problem measurable."
"Q2 Related Work" = "Prior work grouped by theme, including what each line of work claims and how this paper differs from it."
"Q3 Approach" = "The paper's proposed method, mechanism, algorithm, or analysis workflow, written as a causal sequence rather than a loose summary."
"Q4 Experiments and Evidence" = "Experimental setup, ablations, diagnostics, metrics, and results that support or weaken the paper's claims."
"Q5 Future Directions" = "Follow-up research directions, missing experiments, possible extensions, and project-fit ideas prompted by the paper."
"Q6 Main Takeaways" = "A compact synthesis of the paper's main contribution, key findings, and why the result matters."
"Q1 Problem Definition" = "The problem the paper addresses: define input X (e.g., a single RGB image, an image sequence), output Y (e.g., human pose), and any constraints on X or Y."
"Q2 Problem Novelty" = "Whether this is a new problem. If new, why it matters; if not entirely new, why it is still important enough to work on."
"Q3 Scientific Hypothesis" = "The scientific hypothesis being verified, phrased as 'if we do X in the method, we expect result Y', i.e., the new knowledge the paper advances."
"Q4 Related Work and Key People" = "Key related works that inspired the paper, grouped into a taxonomy, plus the key authors and affiliations who would appreciate or criticize it."
"Q5 Key Solution Idea" = "The key of the proposed solution: its main differentiation compared with prior related work."
"Q6 Experiment Design" = "How the experiments are designed and whether they are built to validate every claim the paper makes."
"Q7 Datasets and Code" = "Datasets built or used for quantitative evaluation, and whether the code is open sourced for reproducibility."
"Q8 Evidence Quality" = "Whether the scientific hypothesis and the paper's claims are well supported by the experimental results."
"Q9 Contributions" = "The paper's solid contributions: what knowledge is actually advanced."
"Q10 Next Steps" = "Limitations of the proposed method and the future research they motivate, including new directions or links to other knowledge (the creative part)."
"TL;DR" = "A 1-3 sentence plain-language thesis stating the source's organizing idea, why it matters, and who should read it. Avoid unexplained notation and specialist terminology."
"Overview" = "A fuller introduction to what the source covers, its source-stated scope and boundaries, the problem context, and the terminology needed to understand the synthesis. Do not repeat the TL;DR verbatim or invent coverage counts."
"Framework" = "The organizing taxonomy or structure the source proposes, which is the main value of a synthesis piece. Explain what each branch is for, not just its name. When the framework has three or more branches or non-trivial dependencies, lead with the smallest useful table, nested list, or tree before the detailed prose; do not require a diagram when text is clearer."
"Key Techniques" = "The named methods, tools, or ideas the source surveys, grouped by the framework branches. Give load-bearing techniques 2-4 sentences each (problem, mechanism, key insight) so the note stands alone without the source; keep peripheral ones to one line. When the abstractions remain hard to operationalize, add one paper-supported example or an explicitly labelled reader-constructed example."
"Case Studies" = "Concrete applications and exemplar systems from the source. When both are present, separate them under Application Domains and Exemplar Systems subheadings; omit a subheading the source does not support."
"Evidence Boundaries" = "Distinguish what the synthesis source itself establishes, what individual cited works merely report under incomparable settings, which classifications are qualitative, and which interpretations belong to the note writer."
"Takeaways" = "Reader-owned notes on what to carry into one's own research."

[paper_body.profiles.research-note]
description = "General research note for most papers."
sections = [
  "Summary",
  "Key Ideas",
  "Method",
  "Experiments",
  "Limitations",
  "Notes",
  "Related",
  "Citations",
]

[paper_body.profiles.implementation]
description = "Implementation and reproduction oriented note."
sections = [
  "What To Reproduce",
  "Algorithm",
  "Data",
  "Metrics",
  "Engineering Notes",
  "Failure Modes",
]

[paper_body.profiles.comparison-card]
description = "Compact card for literature review and cross-paper comparison."
sections = [
  "One-line Takeaway",
  "Research Context",
  "Method Family",
  "Compared With",
  "Useful For",
  "Open Questions",
]

[paper_body.profiles.cool-paper-review]
description = "Paper body template derived from the Cool Papers Q1-Q6 reading flow: problem, related work, approach, experiments, future directions, and main takeaways."
sections = [
  "Q1 Research Problem",
  "Q2 Related Work",
  "Q3 Approach",
  "Q4 Experiments and Evidence",
  "Q5 Future Directions",
  "Q6 Main Takeaways",
  "Related",
  "Citations",
]

[paper_body.profiles.ten-question-review]
description = "Reading template from the 'Ten questions to ask when reading a paper' flow: problem, hypothesis, related work, solution, experiments, evidence, contributions, next steps."
sections = [
  "Q1 Problem Definition",
  "Q2 Problem Novelty",
  "Q3 Scientific Hypothesis",
  "Q4 Related Work and Key People",
  "Q5 Key Solution Idea",
  "Q6 Experiment Design",
  "Q7 Datasets and Code",
  "Q8 Evidence Quality",
  "Q9 Contributions",
  "Q10 Next Steps",
  "Related",
  "Citations",
]

[paper_body.profiles.synthesis-source]
description = "Reading lens for a synthesis source (blog, survey, or tutorial) that organizes others' work rather than presenting one contribution."
sections = [
  "TL;DR",
  "Overview",
  "Framework",
  "Key Techniques",
  "Case Studies",
  "Evidence Boundaries",
  "Takeaways",
  "Open Questions",
  "Related",
  "Citations",
]
